name: Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: ${{ matrix.framework }} ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      checks: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - os: windows-latest
            framework: net48
            coverage: false
            results: results4.trx
            artifact: test-results-win48
            std: false
            flag: net48
            publish_nuget: true

          - os: windows-latest
            framework: netcoreapp3.1
            coverage: true
            results: results3.trx
            artifact: test-results-win3
            std: false
            flag: win3
            publish_nuget: false

          - os: windows-latest
            framework: net6.0
            coverage: true
            results: results6.trx
            artifact: test-results-win6
            std: true
            flag: win6
            publish_nuget: false

          - os: windows-latest
            framework: net10.0
            coverage: true
            results: results10.trx
            artifact: test-results-win10
            std: true
            flag: win10
            publish_nuget: false

          # macOS
          - os: macos-latest
            framework: net6.0
            coverage: true
            results: results.trx
            artifact: test-results-mac6
            std: true
            flag: mac6
            publish_nuget: false

          - os: macos-latest
            framework: net10.0
            coverage: true
            results: results.trx
            artifact: test-results-mac10
            std: true
            flag: mac10
            publish_nuget: false

          # Linux
          - os: ubuntu-latest
            framework: net6.0
            coverage: true
            results: results.trx
            artifact: test-results-linux6
            std: true
            flag: linux6
            publish_nuget: false

          - os: ubuntu-latest
            framework: net10.0
            coverage: true
            results: results.trx
            artifact: test-results-linux10
            std: true
            flag: linux10
            publish_nuget: false

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            3.1.x
            6.0.x
            10.0.x

      - name: Install dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: |
          dotnet test --no-restore --verbosity normal -f ${{ matrix.framework }} \
            ${{ matrix.coverage && '-p:CollectCoverage=true' || '' }} \
            ${{ matrix.coverage && '-p:CoverletOutput=TestResults/' || '' }} \
            ${{ matrix.coverage && '-p:CoverletOutputFormat=lcov' || '' }} \
            --logger "trx;LogFileName=${{ matrix.results }}"
        shell: bash

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: success() || failure()
        with:
          name: ${{ matrix.artifact }}
          path: BitFaster.Caching.UnitTests/TestResults/${{ matrix.results }}

      - name: Upload test results (.NET Std)
        if: ${{ matrix.std }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}-std
          path: BitFaster.Caching.UnitTests.Std/TestResults/${{ matrix.results }}

      - name: Publish coverage report to coveralls.io
        if: ${{ matrix.coverage && matrix.flag != '' }}
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: BitFaster.Caching.UnitTests/TestResults/coverage.${{ matrix.framework }}.info
          flag-name: ${{ matrix.flag }}
          parallel: true

      - name: Publish NuGet artifacts
        if: ${{ matrix.publish_nuget }}
        uses: actions/upload-artifact@v7
        with:
          name: NuGet package
          path: BitFaster.Caching/bin/Release/

  coverage:
    name: Coveralls Finished
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Coveralls Finished
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          parallel-finished: true
